global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "api-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-service:8000"]

  - job_name: "payment-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["payment-service:8001"]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "/etc/prometheus/alert_rules.yml"